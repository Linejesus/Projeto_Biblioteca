spring.application.name=api
spring.datasource.url=jdbc:postgresql://localhost:5432/biblioteca
spring.datasource.username=<username>
spring.datasource.password=<senha>

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.data.mongodb.uri=mongodb+srv://<username>:<senha>@biblioteca.<cluster-do-banco>.mongodb.net/Projeto_Biblioteca?retryWrites=true&w=majority&appName=Biblioteca

spring.neo4j.uri=neo4j+s://<cluster>.databases.neo4j.io
spring.neo4j.authentication.username=<username>
spring.neo4j.authentication.password=<senha>